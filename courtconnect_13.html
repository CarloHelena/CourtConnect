<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CourtConnect — Tour-side entourage, matched.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B1B1B;
  --ink-soft:#4A4A44;
  --muted:#8A897F;
  --ivory:#FBFBF9;
  --white:#FFFFFF;
  --line:#D8D6CC;
  --line-strong:#CCCCCC;
  --ivy:#2F5233;
  --ivy-dark:#1E3A20;
  --ivy-tint:#EAF0E7;
  --ocean:#1E5F8C;
  --ocean-tint:#E7F0F5;
  --emerald:#1F8A5F;
  --emerald-tint:#E7F5EE;
  --amber:#C98A2C;
  --amber-tint:#FBF1E1;
  --clay:#A5432A;
  --clay-tint:#F6E9E4;
  --violet:#6B5B95;
  --violet-tint:#EFEBF5;
  --radius:10px;
  --shadow:0 1px 2px rgba(27,27,27,0.04), 0 8px 24px -12px rgba(27,27,27,0.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ivory);
  color:var(--ink);
  font-family:'Plus Jakarta Sans', sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.serif{font-family:'Playfair Display', serif;}
.mono{font-family:'JetBrains Mono', monospace;}
a{color:inherit;}
button{font-family:inherit;}
::selection{background:var(--ivy-tint);}
:focus-visible{outline:2px solid var(--ivy); outline-offset:2px;}

/* ---------- topbar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px;
  background:rgba(251,251,249,0.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:10px; cursor:pointer;}
.brand-mark{width:26px;height:26px;position:relative;}
.brand-mark svg{width:100%;height:100%;}
.brand-word{font-family:'Playfair Display', serif; font-style:italic; font-weight:600; font-size:21px; letter-spacing:0.2px;}
.nav-links{display:flex; gap:4px; align-items:center;}
.user-chip{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--ink-soft); padding:4px 10px 4px 4px; background:var(--white); border:1px solid var(--line); border-radius:999px;}
.nav-btn{
  background:none;border:none;padding:8px 14px;border-radius:999px;
  font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  transition:background .15s, color .15s;
}
.nav-btn:hover{background:var(--white); color:var(--ink);}
.nav-btn.active{background:var(--ivy); color:#fff;}
.nav-cta{
  background:var(--ink); color:#fff; border:none; padding:9px 18px; border-radius:999px;
  font-size:13.5px; font-weight:700; cursor:pointer; margin-left:8px;
}

/* ---------- layout shell ---------- */
#app{min-height:calc(100vh - 63px);}
.wrap{max-width:1180px; margin:0 auto; padding:0 32px;}
.eyebrow{
  text-transform:uppercase; letter-spacing:0.14em; font-size:11.5px; font-weight:700;
  color:var(--ivy); margin:0 0 10px;
}

/* ---------- HERO / tennis court ---------- */
.hero{padding:56px 32px 20px; max-width:1180px; margin:0 auto;}
.hero-head{text-align:center; max-width:640px; margin:0 auto 40px;}
.hero-head h1{
  font-family:'Playfair Display', serif; font-style:italic; font-weight:600;
  font-size:44px; line-height:1.12; margin:0 0 14px; letter-spacing:-0.01em;
}
.hero-head p{color:var(--ink-soft); font-size:16px; line-height:1.6; margin:0;}

.court{
  position:relative; width:100%; aspect-ratio:16/8.4; max-height:480px;
  background:linear-gradient(180deg,#2F5233 0%,#274a2b 100%);
  border-radius:16px; overflow:hidden; box-shadow:var(--shadow);
  border:1px solid var(--line-strong);
}
.court-lines{position:absolute; inset:28px; border:2.5px solid rgba(255,255,255,0.85); border-radius:2px;}
.court-lines::before{ /* net */
  content:''; position:absolute; left:0; right:0; top:50%; height:0;
  border-top:3px dashed rgba(255,255,255,0.9); transform:translateY(-50%);
}
.court-lines::after{ /* center service line */
  content:''; position:absolute; left:50%; top:18%; bottom:18%; width:0; border-left:2.5px solid rgba(255,255,255,0.85);
}
.court-alley-l, .court-alley-r{position:absolute; top:0; bottom:0; width:9%; border-right:2.5px solid rgba(255,255,255,0.55); border-left:2.5px solid rgba(255,255,255,0.55);}
.court-alley-l{left:0;} .court-alley-r{right:0;}
.court-service{position:absolute; left:9%; right:9%; height:2.5px; background:rgba(255,255,255,0.85);}
.court-service.top{top:18%;} .court-service.bottom{bottom:18%;}
.court-cta-row{position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; align-items:center;}
.court-cta{
  justify-self:center; z-index:2;
  background:#fff; color:var(--ink); border:none; padding:15px 30px; border-radius:999px;
  font-size:14.5px; font-weight:700; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,0.25);
  transition:transform .15s;
}
.court-cta:hover{transform:translateY(-2px) scale(1.02);}
.court-cta .sub{display:block; font-weight:500; font-size:11.5px; color:var(--ink-soft); margin-top:2px;}
.court-ball{
  position:absolute; width:16px; height:16px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #eef98a, #cfe33f);
  box-shadow:0 3px 8px rgba(0,0,0,0.35); left:50%; top:50%; transform:translate(-50%,-50%);
  transition:transform .5s cubic-bezier(.3,0,.35,1), opacity .45s ease-in .18s;
}
.court-ball.fly-left{ transform:translate(calc(-50% - 480px), calc(-50% - 40px)) scale(0.35) rotate(-260deg); opacity:0; }
.court-ball.fly-right{ transform:translate(calc(-50% + 480px), calc(-50% - 40px)) scale(0.35) rotate(260deg); opacity:0; }
.court-cta[disabled]{opacity:0.6; cursor:default;}

/* trust strip */
.trust-strip{display:flex; gap:36px; justify-content:center; flex-wrap:wrap; margin:34px 0 8px; color:var(--muted); font-size:13px;}
.trust-strip b{color:var(--ink); font-family:'JetBrains Mono',monospace; font-weight:600;}

/* feature row */
.feature-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin:56px 0;}
.feature-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
  padding:24px; box-shadow:var(--shadow);
}
.feature-card .icn{width:34px;height:34px; margin-bottom:14px;}
.feature-card h3{font-size:16px; margin:0 0 8px; font-weight:700;}
.feature-card p{font-size:13.5px; color:var(--ink-soft); line-height:1.55; margin:0;}

/* ---------- generic cards / buttons ---------- */
.card{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
.btn{
  border:none; border-radius:999px; padding:11px 20px; font-weight:700; font-size:13.5px; cursor:pointer;
}
.btn-primary{background:var(--ivy); color:#fff;}
.btn-primary:hover{background:var(--ivy-dark);}
.btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--line-strong);}
.btn-ghost:hover{background:var(--white);}
.btn-clay{background:var(--clay); color:#fff;}
.pill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:11.5px; font-weight:700;}

/* ---------- ONBOARDING FORMS ---------- */
.onboard-shell{max-width:760px; margin:0 auto; padding:48px 32px 90px;}
.onboard-title{font-family:'Playfair Display',serif; font-style:italic; font-weight:600; font-size:30px; margin:6px 0 6px;}
.onboard-sub{color:var(--ink-soft); font-size:14px; margin:0 0 30px;}
.form-section{margin-bottom:28px; padding-bottom:28px; border-bottom:1px solid var(--line);}
.form-section:last-of-type{border-bottom:none;}
.form-section h4{font-size:12.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 16px; font-weight:700;}
.form-row{display:grid; grid-template-columns:170px 1fr; gap:18px; align-items:start; margin-bottom:16px;}
.form-row label{text-align:right; font-size:13.5px; font-weight:600; color:var(--ink-soft); padding-top:11px;}
.form-row .field-hint, .field-hint{font-size:11.5px; color:var(--muted); margin-top:5px;}
input[type=text], input[type=number], input[type=file], select, textarea{
  width:100%; border:1px solid var(--line-strong); background:#fff; border-radius:8px;
  padding:10px 12px; font-size:13.5px; font-family:inherit; color:var(--ink);
  height:42px; box-sizing:border-box;
}
select{
  appearance:none; -webkit-appearance:none; -moz-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238A897F' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat:no-repeat; background-position:right 12px center; padding-right:30px; cursor:pointer;
}
textarea{min-height:88px; height:auto; resize:vertical;}
input:focus, select:focus, textarea:focus{border-color:var(--ivy);}
.seg{display:flex; gap:8px; flex-wrap:wrap;}
.seg-opt{
  height:42px; box-sizing:border-box; display:inline-flex; align-items:center;
  border:1px solid var(--line-strong); background:#fff; padding:8px 14px; border-radius:999px;
  font-size:13px; font-weight:600; cursor:pointer; color:var(--ink-soft);
}
.seg-opt.selected{background:var(--ink); color:#fff; border-color:var(--ink);}
.check-grid{display:flex; flex-wrap:wrap; gap:8px;}
.check-opt{
  display:flex; align-items:center; gap:7px; border:1px solid var(--line-strong); padding:8px 12px;
  border-radius:8px; font-size:13px; cursor:pointer; background:#fff;
}
.check-opt.selected{border-color:var(--ivy); background:var(--ivy-tint);}
.check-opt input{margin:0;}
.rank-search-wrap{position:relative;}
.rank-results{
  position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--line-strong);
  border-radius:8px; box-shadow:var(--shadow); z-index:5; max-height:220px; overflow:auto;
}
.rank-result{display:flex; justify-content:space-between; padding:10px 12px; font-size:13px; cursor:pointer;}
.rank-result:hover{background:var(--ivory);}
.rank-badge{
  display:inline-flex; align-items:center; gap:8px; background:var(--ivy-tint); color:var(--ivy-dark);
  border:1px solid #cddbc7; padding:8px 14px; border-radius:8px; font-size:13.5px; font-weight:700;
}
.rank-badge .lock{font-size:11px; opacity:.75; font-weight:600;}
.bypass-link{font-size:12.5px; color:var(--ivy); text-decoration:underline; cursor:pointer; background:none; border:none; padding:0; margin-top:6px;}
.specialty-panel{background:var(--ivory); border:1px dashed var(--line-strong); border-radius:8px; padding:14px; margin-top:4px;}
.specialty-role-title{font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:8px;}
.file-drop{border:1.5px dashed var(--line-strong); border-radius:8px; padding:16px; text-align:center; font-size:12.5px; color:var(--muted); background:#fff; cursor:pointer;}
.media-grid{display:flex; flex-wrap:wrap; gap:10px;}
.media-thumb{
  position:relative; width:64px; height:64px; border-radius:8px; background:var(--ivy-tint); border:1px solid #cddbc7;
  display:flex; align-items:center; justify-content:center; font-size:22px;
}
.media-remove{
  position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; border:none;
  background:var(--ink); color:#fff; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.media-add{
  width:64px; height:64px; border-radius:8px; border:1.5px dashed var(--line-strong); background:#fff; color:var(--muted);
  font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; text-align:center; padding:4px;
}
.media-add:hover{border-color:var(--ivy); color:var(--ivy);}
.doc-list{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
.doc-chip{display:inline-flex; align-items:center; gap:6px; background:var(--ivory); border:1px solid var(--line); border-radius:999px; padding:5px 10px; font-size:12px;}
.doc-chip button{border:none; background:none; cursor:pointer; color:var(--muted); font-size:10px;}
.btn-icon-remove{width:28px; height:28px; border-radius:50%; border:1px solid var(--line-strong); background:#fff; color:var(--muted); cursor:pointer; font-size:11px; flex-shrink:0;}
.btn-icon-remove:hover{border-color:var(--clay); color:var(--clay);}
.file-drop.filled{border-color:var(--emerald); color:var(--emerald); background:var(--emerald-tint);}
.form-submit-row{display:flex; justify-content:flex-end; gap:10px; margin-top:8px;}

/* ---------- DIRECTORY / SWIPE ---------- */
.directory-shell{max-width:1180px; margin:0 auto; padding:36px 32px 80px;}
.dir-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; gap:20px; flex-wrap:wrap;}
.dir-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px;}

/* search filters */
.mode-toggle{display:flex; background:var(--white); border:1px solid var(--line-strong); border-radius:999px; padding:3px; height:fit-content;}
.search-filters{display:flex; flex-wrap:wrap; gap:22px; padding:18px 20px; align-items:flex-end;}
.filter-group{display:flex; flex-direction:column; gap:6px;}
.filter-group label{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted);}
.filter-group select, .filter-group input[type=text], .filter-group input[type=number]{padding:8px 10px; font-size:13px; height:38px;}
.filter-group select{padding-right:28px;}
.filter-group .seg-opt{height:38px;}
.filter-group input[type=number]{width:100%;}

/* swipe deck */
.swipe-wrap{display:flex; flex-direction:column; align-items:center; padding:10px 0 30px;}
.swipe-stage{position:relative; width:100%; max-width:340px; height:460px;}
.swipe-stage.swipe-empty{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; border:1px dashed var(--line-strong); border-radius:16px; background:var(--white);}
.swipe-card{
  position:absolute; inset:0; background:#fff; border-radius:18px; overflow:hidden; border:1px solid var(--line);
  box-shadow:0 18px 40px -16px rgba(27,27,27,0.28); display:flex; flex-direction:column; touch-action:none; user-select:none;
}
.swipe-card.front{cursor:grab;}
.swipe-card.front:active{cursor:grabbing;}
.swipe-photo{position:relative; height:210px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.swipe-photo-initials{font-family:'Playfair Display',serif; font-style:italic; font-weight:600; font-size:52px; color:rgba(255,255,255,0.92);}
.swipe-flag{position:absolute; top:18px; padding:6px 14px; border:3px solid #fff; border-radius:8px; font-weight:800; font-size:15px; letter-spacing:.04em; color:#fff; opacity:0; transform:rotate(-10deg);}
.swipe-flag.like{left:18px; border-color:#3aa06b; color:#3aa06b; background:rgba(255,255,255,0.85); transform:rotate(-10deg);}
.swipe-flag.pass{right:18px; border-color:#c24b3a; color:#c24b3a; background:rgba(255,255,255,0.85); transform:rotate(10deg);}
.swipe-info{padding:16px 18px; flex:1; display:flex; flex-direction:column;}
.swipe-actions{display:flex; gap:18px; margin-top:22px;}
.swipe-btn{
  width:54px; height:54px; border-radius:50%; border:1px solid var(--line-strong); background:#fff; font-size:20px;
  cursor:pointer; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; color:var(--ink);
}
.swipe-btn.pass{color:#c24b3a;}
.swipe-btn.like{color:#3aa06b; width:62px; height:62px; font-size:24px;}
.swipe-btn.info{color:var(--muted); font-family:'Playfair Display',serif; font-style:italic;}
.swipe-btn:hover{transform:translateY(-2px);}
.staff-card{padding:16px; cursor:pointer; transition:transform .15s, box-shadow .15s;}
.staff-card:hover{transform:translateY(-2px); box-shadow:0 10px 24px -10px rgba(27,27,27,0.2);}
.staff-card-top{display:flex; gap:12px; align-items:center;}
.avatar{width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; color:#fff; flex-shrink:0;}
.staff-name{font-weight:700; font-size:14.5px;}
.staff-role-tag{font-size:11px; font-weight:700; margin-top:2px;}
.staff-card-meta{display:flex; gap:8px; margin:12px 0 10px; flex-wrap:wrap;}
.staff-card-bio{font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin:0 0 12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.staff-card-foot{display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--muted);}
.preview-banner{
  display:flex; justify-content:space-between; align-items:center; gap:18px; flex-wrap:wrap;
  background:var(--amber-tint); border:1px solid #ecd6ab; border-radius:10px; padding:14px 18px; margin-bottom:18px;
  font-size:13px; color:#5c431b; line-height:1.5;
}
.blurred-text{filter:blur(4px); user-select:none;}
.staff-card.masked{cursor:pointer;}
.staff-card.masked .avatar{display:flex; align-items:center; justify-content:center; font-size:16px;}
.mask-cta{
  margin-top:10px; text-align:center; font-size:11px; font-weight:700; color:var(--ivy-dark);
  background:var(--ivy-tint); padding:7px; border-radius:6px;
}
.rate-tag{font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--ink); font-size:12.5px;}

/* ---------- PLANNER ---------- */
.planner-shell{max-width:1440px; margin:0 auto; padding:24px 24px 60px;}
.planner-toolbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px;}
.zoom-toggle{display:flex; background:var(--white); border:1px solid var(--line-strong); border-radius:999px; padding:3px;}
.zoom-opt{border:none; background:none; padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:700; cursor:pointer; color:var(--ink-soft);}
.zoom-opt.selected{background:var(--ink); color:#fff;}
.price-accum{
  background:var(--ivy); color:#fff; border-radius:999px; padding:9px 18px; font-size:13px; font-weight:700;
  display:flex; align-items:center; gap:8px;
}
.price-accum .amt{font-family:'JetBrains Mono',monospace; font-size:14.5px;}
.planner-body{display:grid; grid-template-columns:1fr 268px; gap:18px; align-items:start;}
.planner-scroll{overflow-x:auto; border:1px solid var(--line-strong); border-radius:var(--radius); background:#fff;}
.gantt{position:relative; min-width:900px;}
.gantt-header{display:flex; border-bottom:2px solid var(--line-strong); background:#fff; z-index:3;}
.gantt-header-spacer{width:150px; flex-shrink:0; border-right:1px solid var(--line); background:var(--ivory); position:sticky; left:0; z-index:6;}
.gantt-day-track{position:relative; flex:0 0 auto;}
.tourn-band{position:absolute; top:0; height:100%; border-left:1px dashed #cfd0c6;}
.tourn-band .tourn-lbl{position:absolute; top:6px; left:6px; font-size:10.5px; font-weight:700; color:var(--ivy-dark); white-space:nowrap; background:var(--ivy-tint); padding:2px 6px; border-radius:4px;}
.tourn-band.pending, .tourn-band.chosen{cursor:pointer;}
.tourn-band.pending .tourn-lbl{background:repeating-linear-gradient(135deg, var(--amber-tint), var(--amber-tint) 6px, #fff 6px, #fff 12px); border:1px dashed var(--amber); color:#8a5f1c;}
.tourn-band.chosen .tourn-lbl{background:var(--ivy-tint); border:1px solid #cddbc7;}
.tourn-band.pending:hover .tourn-lbl, .tourn-band.chosen:hover .tourn-lbl{filter:brightness(0.96);}
.tourn-swap{opacity:0.65; margin-left:2px;}
.gantt-row{display:flex; border-bottom:1px solid var(--line); min-height:64px;}
.gantt-row-label{
  width:150px; flex-shrink:0; border-right:1px solid var(--line); background:var(--ivory);
  display:flex; align-items:center; gap:8px; padding:0 12px; font-size:12.5px; font-weight:700;
  position:sticky; left:0; z-index:5;
}
.role-dot{width:9px;height:9px;border-radius:50%; flex-shrink:0;}
.gantt-lane{position:relative; flex:0 0 auto;}
.gantt-ruler{display:flex; background:#fff; border-bottom:1px solid var(--line-strong);}
.ruler-track{position:relative;}
.ruler-tick{position:absolute; top:0; bottom:0; border-left:1px solid #e7e6dd;}
.ruler-tick span{position:absolute; top:5px; left:5px; font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; white-space:nowrap;}
.ruler-tick.month{border-left:1.5px solid var(--ivy);}
.ruler-tick.month span{font-weight:800; color:var(--ivy-dark); font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; letter-spacing:.01em; top:5px;}
.lane-block{
  position:absolute; top:9px; bottom:9px; border-radius:7px;
  display:flex; align-items:stretch; overflow:hidden; touch-action:none; user-select:none;

/* Reverse-privacy gate: does this crew member's own target filter allow this player to see them? */
function passesGate(staff, player){
  const tf = staff.targetFilters;
  if(!tf || !player) return true;
  if(tf.genders && tf.genders.length && !tf.genders.includes(player.gender)) return false;
  if(tf.tours && tf.tours.length && !tf.tours.includes(player.tour)) return false;
  if(tf.minAge!=null && (player.age==null || player.age < tf.minAge)) return false;
  if(tf.maxAge!=null && (player.age==null || player.age > tf.maxAge)) return false;
  if(tf.minRank!=null && (!player.rank || player.rank < tf.minRank)) return false;
  if(tf.maxRank!=null && (!player.rank || player.rank > tf.maxRank)) return false;
  return true;
}
function matchesSearch(staff){
  const f = state.search;
  if(f.role!=='All' && staff.role!==f.role) return false;
  if(f.models.length && !f.models.some(m=>staff.models.includes(m))) return false;
  if(f.minRate!=='' && staff.rate < parseFloat(f.minRate)) return false;
  if(f.maxRate!=='' && staff.rate > parseFloat(f.maxRate)) return false;
  if(f.minStars>0 && parseFloat(staff.stars) < f.minStars) return false;
  if(f.lang && !staff.langs.split(',').map(s=>s.trim()).includes(f.lang)) return false;
  return true;
}
function searchResults(){
  const player = sessionPlayer();
  return STAFF.filter(s=> passesGate(s, player) && matchesSearch(s));
}
function setSearch(k,v){ state.search[k]=v; state.search.swipeIndex=0; render(); }
function toggleSearchModel(m){
  const f = state.search;
  f.models = f.models.includes(m) ? f.models.filter(x=>x!==m) : [...f.models, m];
  f.swipeIndex = 0; render();
}

/* ============ RENDER ROOT ============ */
function captureFocus(){
  const el = document.activeElement;
  if(el && el.id && (el.tagName==='INPUT'||el.tagName==='TEXTAREA')){
    return {id:el.id, start:el.selectionStart, end:el.selectionEnd};
  }
  return null;
}
function restoreFocus(f){
  if(!f) return;
  const el = document.getElementById(f.id);
  if(el){
    el.focus();
    if(el.setSelectionRange && f.start!=null){ try{ el.setSelectionRange(f.start, f.end); }catch(e){} }
  }
}
function render(){
  const focusInfo = captureFocus();
  if(state.view==='planner' && !state.plannerScrollOverride){
    const psEl = document.getElementById('plannerScroll');
    if(psEl) state.plannerScrollLeft = psEl.scrollLeft;
  }
  if(state.view==='crewCalendar' && !state.crewScrollOverride){
    const csEl = document.getElementById('crewScroll');
    if(csEl) state.crewScrollLeft = csEl.scrollLeft;
  }
  state.plannerScrollOverride = false;
  state.crewScrollOverride = false;
  renderNav();
  const app = document.getElementById('app');
  if(state.view==='home') app.innerHTML = viewHome();
  else if(state.view==='onboardPlayer') app.innerHTML = viewOnboardPlayer();
  else if(state.view==='onboardStaff') app.innerHTML = viewOnboardStaff();
  else if(state.view==='directory') app.innerHTML = sessionStaff() ? viewCrewNoSearch() : viewDirectory();
  else if(state.view==='planner') app.innerHTML = sessionPlayer() ? viewPlanner() : viewNeedsAuth('player');
  else if(state.view==='profile') app.innerHTML = viewProfile(state.viewCtx);
  else if(state.view==='playerProfile') app.innerHTML = viewPlayerProfile(state.viewCtx);
  else if(state.view==='crewCalendar') app.innerHTML = sessionStaff() ? viewCrewCalendar() : viewNeedsAuth('staff');
  else if(state.view==='chat') app.innerHTML = (sessionPlayer()||sessionStaff()) ? viewChat() : viewNeedsAuth('chat');
  afterRender();
  restoreFocus(focusInfo);
}

function setOP(k,v){ state.onboardPlayer[k]=v; if(k==='ranked'&&v===false){state.onboardPlayer.selectedRank=null;} render(); }
function toggleOPLang(code){
  const arr = state.onboardPlayer.langsArr;
  state.onboardPlayer.langsArr = arr.includes(code) ? arr.filter(c=>c!==code) : [...arr, code];
  render();
}
function pickRank(name,tour,rank,gender){ state.onboardPlayer.selectedRank={name,tour,rank,gender}; state.onboardPlayer.rankSearch=''; render(); }
function clearRank(){ state.onboardPlayer.selectedRank=null; render(); }
async function submitPlayer(){
  const o = state.onboardPlayer;
  let profile;
  if(o.selectedRank){ profile = {name:o.selectedRank.name, tour:o.selectedRank.tour, rank:o.selectedRank.rank, gender:o.selectedRank.gender, age:23, homebase:o.homebase||'—', langs:o.langsArr.join(', ')||'—'}; }
  else { profile = {name:'New Player', tour:o.tour, rank:null, gender:o.gender, homebase:o.homebase||'—', langs:o.langsArr.join(', ')||'—'}; }
  profile.age = profile.age || 22;

  if(ONLINE){
    try{
      const r = await apiFetch('/api/auth/register-player', {method:'POST', body:JSON.stringify(profile)});
      AUTH_TOKEN = r.token;
      profile = r.profile;
    }catch(e){ console.error(e); profile.id = uid('p'); }
  } else {
    profile.id = uid('p');
  }
  PLAYERS.push(profile);
  state.currentPlayer = profile;
  state.session = {role:'player', id:profile.id};
  go('planner');
}

async function submitStaff(){
  const o = state.onboardStaff;
  const role = o.roles[0] || 'Coach';
  const validRates = o.rates.filter(r=>parseFloat(r.amount)>0);
  const primary = validRates[0] || {amount:150, freq:'Day'};

  if(state.editingStaffId){
    const rec = STAFF.find(x=>x.id===state.editingStaffId);
    if(rec){
      const patch = {
        role,
        models: o.models.length ? o.models : ['Short-Term'],
        rate: parseFloat(primary.amount) || 150,
        freq: primary.freq || 'Day',
        bio: o.bio || rec.bio,
        certs: o.certs,
        rates: validRates.map(r=>({amount:parseFloat(r.amount), freq:r.freq})),
        socials: {...o.socials},
        media: o.media,
        photo: o.profilePhoto || rec.photo,
        certDocs: o.certDocs
      };
      Object.assign(rec, patch);
      if(ONLINE){ apiFetch('/api/staff/'+rec.id, {method:'PUT', body:JSON.stringify(patch)}).catch(e=>console.error(e)); }
    }
    state.editingStaffId = null;
    showToast('Profile updated.');
    go('profile', state.session.id);
    return;
  }

  let rec;
  const payload = {
    name:'New Crew Member', role, models:o.models.length?o.models:['Short-Term'],
    rate:parseFloat(primary.amount)||150, freq:primary.freq||'Day',
    bio:o.bio||'New crew profile — bio coming soon.', langs:'EN',
    rates: validRates.map(r=>({amount:parseFloat(r.amount), freq:r.freq})),
    socials: {...o.socials}, media:o.media, photo:o.profilePhoto||null, certDocs:o.certDocs, certs:o.certs
  };
  if(ONLINE){
    try{
      const r = await apiFetch('/api/auth/register-staff', {method:'POST', body:JSON.stringify(payload)});
      AUTH_TOKEN = r.token;
      rec = r.profile;
    }catch(e){ console.error(e); }
  }
  if(!rec){
    rec = mkStaff('New Crew Member', role, payload.models, payload.rate, payload.freq, payload.bio, 'EN');
    rec.rates = payload.rates; rec.socials = payload.socials; rec.media = payload.media; rec.photo = payload.photo; rec.certDocs = payload.certDocs;
  }
  STAFF.push(rec);
  state.session = {role:'staff', id:rec.id};
  go('profile', rec.id);
}

      <button class="swipe-btn info" onclick="${masked?'openSignIn()':`go('profile','${results[idx].id}')`}" aria-label="View profile">i</button>

function swipeDecide(staffId, liked){
  if(liked && !state.shortlist.includes(staffId)) state.shortlist.push(staffId);
  state.search.swipeIndex += 1;
  render();
}
let dragCtx = null;
function swipeStart(ev){
  const card = document.getElementById('frontCard');
  if(!card) return;
  dragCtx = {startX:ev.clientX, startY:ev.clientY, card};
  card.setPointerCapture(ev.pointerId);
  card.addEventListener('pointermove', swipeMove);
  card.addEventListener('pointerup', swipeEnd);
  card.addEventListener('pointercancel', swipeEnd);
}
function swipeMove(ev){
  if(!dragCtx) return;
  const dx = ev.clientX - dragCtx.startX;
  const dy = ev.clientY - dragCtx.startY;
  const rot = dx/14;
  dragCtx.card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
  dragCtx.card.style.transition = 'none';
  dragCtx.dx = dx;
  const likeFlag = dragCtx.card.querySelector('.like');
  const passFlag = dragCtx.card.querySelector('.pass');
  if(likeFlag) likeFlag.style.opacity = dx>40 ? Math.min(1,(dx-40)/60) : 0;
  if(passFlag) passFlag.style.opacity = dx<-40 ? Math.min(1,(-dx-40)/60) : 0;
}
function swipeEnd(ev){
  if(!dragCtx) return;
  const dx = dragCtx.dx || 0;
  const card = dragCtx.card;
  card.removeEventListener('pointermove', swipeMove);
  card.removeEventListener('pointerup', swipeEnd);
  card.removeEventListener('pointercancel', swipeEnd);
  const results = searchResults();
  const idx = state.search.swipeIndex;
  const staffId = results[idx] ? results[idx].id : null;
  dragCtx = null;
  if(!staffId){ return; }
  if(dx > 110){
    card.style.transition = 'transform .35s ease';
    card.style.transform = `translate(600px, ${-40}px) rotate(24deg)`;
    setTimeout(()=>swipeDecide(staffId, true), 220);
  } else if(dx < -110){
    card.style.transition = 'transform .35s ease';
    card.style.transform = `translate(-600px, ${-40}px) rotate(-24deg)`;
    setTimeout(()=>swipeDecide(staffId, false), 220);
  } else {
    card.style.transition = 'transform .3s ease';
    card.style.transform = 'translate(0,0) rotate(0)';
  }
}

function tierOptionsFor(tour){
  if(tour==='ATP') return ['ATP','Challenger'];
  if(tour==='WTA') return ['WTA','Challenger'];
  if(tour==='Challenger') return ['All'];
  if(tour==='ITF') return ['Challenger','ITF'];
  return ['All'];
}
function setPlannerTier(t){ state.plannerTier = t; render(); }

/* Group overlapping tournaments (same tier) into clusters — a player can only be at one at a time */
function tournamentClusters(tier){
  const visible = TOURNAMENTS.filter(t=>tournamentVisible(t, tier)).sort((a,b)=>a.start-b.start);
  const clusters = [];
  let current = null;
  visible.forEach(t=>{
    if(current && t.start <= current.end){
      current.items.push(t);
      current.end = Math.max(current.end, t.end);
      current.start = Math.min(current.start, t.start);
    } else {
      current = {start:t.start, end:t.end, items:[t]};
      clusters.push(current);
    }
  });
  return clusters;
}
function clusterKeyOf(cluster){ return cluster.items.map(t=>t.name).sort().join('|'); }
function openTournamentPicker(clusterKey){
  const clusters = tournamentClusters(state.plannerTier);
  const cluster = clusters.find(c=>clusterKeyOf(c)===clusterKey);
  if(!cluster) return;
  state.tournamentPickCtx = {clusterKey, items:cluster.items};
  renderOverlay();
}
function chooseTournament(clusterKey, name){
  state.tournamentChoice[clusterKey] = name;
  state.tournamentPickCtx = null;
  renderOverlay();
  render();
}
function clearTournamentChoice(clusterKey){
  delete state.tournamentChoice[clusterKey];
  state.tournamentPickCtx = null;
  renderOverlay();
  render();
}

    <div class="planner-body">

function plannerTotal(){
  return state.bookings.reduce((sum,b)=>{
    const dur = Math.max(0, b.endDay-b.startDay);
    const dailyRate = b.freq==='Day'? b.price : b.freq==='Week'? b.price/7 : b.price/30;
    return sum + dailyRate*dur;
  },0) | 0;
}
function visibleRange(){
  const psEl = document.getElementById('plannerScroll');
  const pxday = ZOOM_PXDAY[state.zoom];
  if(!psEl) return {start:PLANNER_MIN_DAY, end:PLANNER_MAX_DAY};
  const start = PLANNER_MIN_DAY + Math.max(0, psEl.scrollLeft-150)/pxday;
  const end = start + Math.max(0, psEl.clientWidth-150)/pxday;
  return {start, end};
}
function visibleWindowTotal(){
  const {start, end} = visibleRange();
  return state.bookings.reduce((sum,b)=>{
    const os = Math.max(b.startDay, start), oe = Math.min(b.endDay, end);
    const overlap = Math.max(0, oe-os);
    const dailyRate = b.freq==='Day'? b.price : b.freq==='Week'? b.price/7 : b.price/30;
    return sum + dailyRate*overlap;
  },0) | 0;
}
function updatePriceBadge(){
  const el = document.getElementById('priceAccumAmt');
  if(el) el.textContent = '$'+visibleWindowTotal().toLocaleString();
}
function setZoom(z){
  const psEl = document.getElementById('plannerScroll');
  if(psEl){
    const oldPxday = ZOOM_PXDAY[state.zoom];
    const centerDay = PLANNER_MIN_DAY + (Math.max(0,psEl.scrollLeft-150) + psEl.clientWidth/2)/oldPxday;
    const newPxday = ZOOM_PXDAY[z];
    state.plannerScrollLeft = Math.max(0, 150 + (centerDay-PLANNER_MIN_DAY)*newPxday - psEl.clientWidth/2);
    state.plannerScrollOverride = true;
  }
  state.zoom = z;
  render();
}
function handleDrop(ev, role, pxday){

function cellClick(ev, role, pxday){

/* ---------- drag to move / resize a booking on the timeline ---------- */
let blockDrag = null;
function blockDragStart(ev, itemId, mode, kind){
  ev.preventDefault(); ev.stopPropagation();
  kind = kind || 'booking';
  const el = document.getElementById('block-'+itemId);
  if(!el) return;
  const pxday = kind==='block' ? ZOOM_PXDAY[state.crewZoom] : ZOOM_PXDAY[state.zoom];
  blockDrag = {itemId, mode, kind, startX:ev.clientX, origLeft:parseFloat(el.style.left), origWidth:parseFloat(el.style.width), pxday, moved:0, el};
  el.style.zIndex = 30;
  window.addEventListener('pointermove', blockDragMove);
  window.addEventListener('pointerup', blockDragEnd);
}
function blockDragMove(ev){
  if(!blockDrag) return;
  const dx = ev.clientX - blockDrag.startX;
  blockDrag.moved = Math.max(blockDrag.moved, Math.abs(dx));
  const {mode, origLeft, origWidth, pxday, el} = blockDrag;
  const minW = Math.max(pxday*0.9, 6);
  if(mode==='move'){
    el.style.left = (origLeft+dx)+'px';
  } else if(mode==='resize-left'){
    let newLeft = origLeft+dx, newWidth = origWidth-dx;
    if(newWidth < minW){ newWidth = minW; newLeft = origLeft+origWidth-minW; }
    el.style.left = newLeft+'px'; el.style.width = newWidth+'px';
  } else if(mode==='resize-right'){
    let newWidth = origWidth+dx;
    if(newWidth < minW) newWidth = minW;
    el.style.width = newWidth+'px';
  }
}
function blockDragEnd(){
  if(!blockDrag) return;
  const {itemId, mode, kind, moved, pxday, el} = blockDrag;
  window.removeEventListener('pointermove', blockDragMove);
  window.removeEventListener('pointerup', blockDragEnd);
  const list = kind==='block' ? state.crewBlocks : state.bookings;
  const item = list.find(x=>x.id===itemId);
  blockDrag = null;
  if(!item){ render(); return; }
  if(mode==='move' && moved<6){
    if(kind==='block'){ openBlockEdit(item.id); } else { openHandshake(item.staffId, item); }
    return;
  }
  const finalLeft = parseFloat(el.style.left);
  const finalWidth = parseFloat(el.style.width);
  const newStart = PLANNER_MIN_DAY + Math.round(finalLeft/pxday);
  const newEnd = Math.max(newStart+1, PLANNER_MIN_DAY + Math.round((finalLeft+finalWidth)/pxday));
  item.startDay = newStart;
  item.endDay = newEnd;
  render();
}

async function saveBlock(){
  const s = sessionStaff();
  const ctx = state.blockEditCtx;
  const startIso = document.getElementById('beStart').value;
  const endIso = document.getElementById('beEnd').value;
  const existing = ctx.id ? state.crewBlocks.find(x=>x.id===ctx.id) : null;
  const start = startIso ? dayForDate(startIso) : (existing?existing.startDay:ctx.startDay);
  const end = endIso ? dayForDate(endIso) : (existing?existing.endDay:ctx.endDay);
  const label = document.getElementById('beLabel').value || 'Unavailable';
  if(existing){
    existing.startDay = Math.max(PLANNER_MIN_DAY, start);
    existing.endDay = Math.max(existing.startDay+1, end);
    existing.label = label;
    if(ONLINE){ apiFetch('/api/blocks/'+existing.id, {method:'PUT', body:JSON.stringify({startDay:existing.startDay, endDay:existing.endDay, label})}).catch(e=>console.error(e)); }
  } else {
    const sd = Math.max(PLANNER_MIN_DAY, start);

      catch(e){ console.error(e); state.crewBlocks.push({id:uid('blk'), ...payload}); }

    <div class="planner-toolbar">
      <div>
        <div class="eyebrow" style="margin-bottom:2px;">My calendar</div>

      </div>

        <p class="hint">${pending.length? 'Drag an offer onto the drop zone to accept it, or use the buttons.' : 'No pending offers right now.'}</p>

          const pl = PLAYERS.find(p=>p.id===b.playerId);

              <div><div class="nm">${pl?pl.name:'Unknown player'}</div><div class="rl">${pl?pl.tour:''}${pl&&pl.rank?(' #'+pl.rank):''}</div></div>

            <div class="offer-card-actions">
              <button class="btn btn-ghost" style="flex:1; padding:7px;" onclick="declineOffer('${b.id}')">Decline</button>

          Drag a confirmed booking here to cancel it

/* ============ CHAT ============ */
const ICEBREAKERS = [
  'What is your travel visa status for the US Open?',
  'Which weeks are you locking in for the clay swing?',
  'Any dietary restrictions or allergies I should plan around?'
];
function chatKeyFor(playerId, staffId){ return playerId+'|'+staffId; }
function conversationsForCurrentUser(){
  const p = sessionPlayer(), s = sessionStaff();
  if(p){
    const staffIds = Array.from(new Set(state.bookings.filter(b=>b.playerId===p.id).map(b=>b.staffId)));
    return staffIds.map(id=>{
      const st = STAFF.find(x=>x.id===id);
      return {key:chatKeyFor(p.id,id), name:st.name, sub:st.role, avatarBg:ROLE_META[st.role].hex, photo:st.photo, playerId:p.id, staffId:id};
    });
  } else if(s){
    const playerIds = Array.from(new Set(state.bookings.filter(b=>b.staffId===s.id).map(b=>b.playerId)));
    return playerIds.map(id=>{
      const pl = PLAYERS.find(x=>x.id===id);
      return {key:chatKeyFor(id,s.id), name:pl?pl.name:'Unknown player', sub:pl?(pl.tour+(pl.rank?(' #'+pl.rank):'')):'', avatarBg:'#1B1B1B', photo:null, playerId:id, staffId:s.id};
    });
  }
  return [];
}
function viewChat(){
  const convos = conversationsForCurrentUser();
  if((!state.activeChatKey || !convos.find(c=>c.key===state.activeChatKey)) && convos.length) state.activeChatKey = convos[0].key;
  const active = convos.find(c=>c.key===state.activeChatKey);
  if(active) loadChatHistory(active.key);
  const messages = active ? (state.chats[active.key]||[]) : [];
  const isStaffViewer = !!sessionStaff();
  const threadBookings = active ? state.bookings.filter(b=>b.playerId===active.playerId && b.staffId===active.staffId) : [];

  return `
  <div class="chat-shell">
    <div class="chat-sidebar">
      <h4 style="margin:0 0 12px; font-size:14px;">Conversations</h4>
      ${convos.length ? convos.map(c=>`
        <div class="chat-convo ${c.key===state.activeChatKey?'active':''}" onclick="openChat('${c.key}')">
          ${avatarHTML(c.name, c.photo, c.avatarBg, 34, 12)}
          <div><div class="nm">${c.name}</div><div class="rl">${c.sub}</div></div>
        </div>
      `).join('') : `<div class="empty-shortlist">Conversations open once a handshake is proposed or booked.</div>`}
    </div>
    <div class="chat-main">
      ${active ? `
        <div class="chat-thread-head">
          ${avatarHTML(active.name, active.photo, active.avatarBg, 32, 12)}
          <div><div class="nm">${active.name}</div><div class="rl">${active.sub}</div></div>
        </div>
        ${threadBookings.length ? `
        <div class="chat-offers">
          ${threadBookings.map(b=>{
            const tourn = tournamentForBooking(b);
            return `<div class="chat-offer-strip ${b.status}">
              <div>
                <span class="offer-status ${b.status}">${b.status==='pending'?'Pending offer':'Confirmed'}</span>
                ${fmtShort(dateForDay(b.startDay))} – ${fmtShort(dateForDay(b.endDay))} · ${b.model} · $${b.price}/${b.freq.toLowerCase()}${tourn?` · ${tourn.name}`:''}
              </div>
              ${b.status==='pending' ? (isStaffViewer
                ? `<div style="display:flex; gap:6px;"><button class="btn btn-ghost" style="padding:5px 10px; font-size:11.5px;" onclick="declineOffer('${b.id}')">Decline</button><button class="btn btn-primary" style="padding:5px 10px; font-size:11.5px;" onclick="acceptOffer('${b.id}')">Accept</button></div>`
                : `<div style="display:flex; gap:6px;"><button class="btn btn-ghost" style="padding:5px 10px; font-size:11.5px;" onclick="declineOffer('${b.id}')">Withdraw</button><button class="btn btn-ghost" style="padding:5px 10px; font-size:11.5px;" onclick="openHandshakeForBooking('${b.id}')">Edit</button></div>`)
                : ''}
            </div>`;
          }).join('')}
        </div>` : ''}
        <div class="chat-thread" id="chatThread">
          ${messages.length ? messages.map(m=>`<div class="chat-msg ${m.from==='me'?'me':'them'}">${m.text}</div>`).join('') : `
            <div class="chat-empty">
              <p>No messages yet. Break the ice:</p>
              ${ICEBREAKERS.map(q=>`<button class="chip-btn" onclick='sendChatMessage(${JSON.stringify(q)})'>${q}</button>`).join('')}
            </div>
          `}
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Write a message…" onkeydown="if(event.key==='Enter'){sendChatFromInput();}"/>
          <button class="btn btn-primary" onclick="sendChatFromInput()">Send</button>
        </div>
      ` : `<div class="empty-shortlist" style="padding:40px;">Select a conversation to start chatting.</div>`}
    </div>
  </div>`;
}
function openChat(key){ state.activeChatKey = key; render(); loadChatHistory(key); }
function sendChatMessage(text){
  if(!text || !text.trim() || !state.activeChatKey) return;
  const key = state.activeChatKey;
  if(!state.chats[key]) state.chats[key] = [];
  state.chats[key].push({from:'me', text:text.trim()});
  if(ONLINE){ apiFetch('/api/chats/'+encodeURIComponent(key)+'/messages', {method:'POST', body:JSON.stringify({text:text.trim()})}).catch(e=>console.error(e)); }
  render();
  setTimeout(()=>{ const t=document.getElementById('chatThread'); if(t) t.scrollTop = t.scrollHeight; }, 0);
}
async function loadChatHistory(key){
  if(!ONLINE || state.chats[key]) return;
  try{
    const msgs = await apiFetch('/api/chats/'+encodeURIComponent(key));
    const sess = state.session;
    state.chats[key] = msgs.map(m=>({from: (sess && m.fromId===sess.id) ? 'me':'them', text:m.text}));
    render();
  }catch(e){ console.error(e); }
}
function sendChatFromInput(){
  const el = document.getElementById('chatInput');
  if(!el) return;
  const v = el.value;
  el.value='';
  sendChatMessage(v);
}

/* sign-in */
function openSignIn(){ state.signinOpen = true; renderOverlay(); }
function closeSignIn(){ state.signinOpen = false; renderOverlay(); }
async function signInAsPlayer(id){
  state.session = {role:'player', id};
  state.currentPlayer = PLAYERS.find(p=>p.id===id);
  state.signinOpen = false;
  state.activeChatKey = null;
  state.plannerScrollLeft = null;
  if(ONLINE){
    try{ const r = await apiFetch('/api/auth/signin', {method:'POST', body:JSON.stringify({type:'player', id})}); AUTH_TOKEN = r.token; }catch(e){ console.error(e); }
  }
  go('planner');
}
async function signInAsStaff(id){
  state.session = {role:'staff', id};
  state.signinOpen = false;
  state.activeChatKey = null;
  state.crewScrollLeft = null;
  if(ONLINE){
    try{ const r = await apiFetch('/api/auth/signin', {method:'POST', body:JSON.stringify({type:'staff', id})}); AUTH_TOKEN = r.token; }catch(e){ console.error(e); }
  }
  go('profile', id);
}
function signOut(){
  if(ONLINE && AUTH_TOKEN){ apiFetch('/api/auth/signout', {method:'POST'}).catch(()=>{}); }
  AUTH_TOKEN = null;
  state.session = null;
  state.activeChatKey = null;
  go('home');
}

      <div class="panel hs-modal">
        <div class="panel-head">
          <div><h3>${editing?'Edit booking':'Handshake proposal'}</h3><p>${editing?`Update the terms with ${s.name}`:`Propose terms to ${s.name}`}</p></div>
          <button class="panel-close" onclick="state.hsCtx=null; renderOverlay();">✕</button>
        </div>
        <div class="hs-summary">
          ${avatarHTML(s.name, s.photo, rm.hex, 44)}
          <div><div style="font-weight:700; font-size:13.5px;">${s.name}</div><div style="font-size:11.5px; color:${rm.color}; font-weight:700;">${s.role}</div></div>
        </div>
        <div class="hs-row2">
          <div class="hs-field"><label>Start date</label><input type="date" id="hsStart" value="${isoForDay(editing?editing.startDay:0)}"/></div>
          <div class="hs-field"><label>End date</label><input type="date" id="hsEnd" value="${isoForDay(editing?editing.endDay:7)}"/></div>
        </div>
        <div class="hs-field"><label>Contract model</label>
          <select id="hsModel">${s.models.map(m=>`<option ${editing&&editing.model===m?'selected':''}>${m}</option>`).join('')}</select>
        </div>
        <div class="hs-row2">
          <div class="hs-field"><label>Custom price offer</label><input type="number" id="hsPrice" value="${editing?editing.price:s.rate}"/>
            <div class="field-hint">${s.name.split(' ')[0]}'s reference rate: $${s.rate}/${s.freq.toLowerCase()}</div>
          </div>
          <div class="hs-field"><label>Payment frequency</label>
            <select id="hsFreq">${['Day','Week','Month'].map(f=>`<option ${(editing?editing.freq:s.freq)===f?'selected':''}>${f}</option>`).join('')}</select>
          </div>
        </div>
        <div class="hs-field"><label>Comments</label><textarea id="hsComments" placeholder="Any context for ${s.name.split(' ')[0]}…"></textarea></div>
        <div class="form-submit-row">
          <button class="btn btn-ghost" onclick="state.hsCtx=null; renderOverlay();">Cancel</button>
          <button class="btn btn-ghost" style="border-color:var(--ivy); color:var(--ivy-dark);" onclick="saveBooking('${staffId}')">Save</button>
          <button class="btn btn-clay" onclick="sendHandshakeBtn('${staffId}')">Send handshake</button>
        </div>
      </div>
    </div>`;
  }
}
function openHandshake(staffId, editingBooking, roleHint, dayHint){
  let editing = editingBooking;
  if(!editing && dayHint!==undefined && dayHint!==null){
    editing = {startDay:dayHint, endDay:dayHint+7, model:STAFF.find(s=>s.id===staffId).models[0], price:STAFF.find(s=>s.id===staffId).rate, freq:STAFF.find(s=>s.id===staffId).freq};
  }
  state.hsCtx = {staffId, editing};
  state.vacantCtx = null;
  renderOverlay();
}
function openHandshakeForBooking(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  openHandshake(b.staffId, b);
}
function readHsForm(){
  const startIso = document.getElementById('hsStart').value;
  const endIso = document.getElementById('hsEnd').value;
  const start = startIso ? dayForDate(startIso) : 0;
  const end = endIso ? dayForDate(endIso) : start+7;
  return {
    startDay: Math.max(PLANNER_MIN_DAY, start),
    endDay: Math.max(start+1, end),
    model: document.getElementById('hsModel').value,
    price: parseFloat(document.getElementById('hsPrice').value)||0,
    freq: document.getElementById('hsFreq').value
  };
}
async function saveBooking(staffId, opts){
  opts = opts || {};
  const form = readHsForm();
  const s = STAFF.find(x=>x.id===staffId);
  const editing = state.hsCtx.editing;
  const player = sessionPlayer();
  if(editing && editing.id){
    const b = state.bookings.find(x=>x.id===editing.id);
    if(b){
      Object.assign(b, form);
      if(opts.setStatus) b.status = opts.setStatus;
      if(ONLINE){ apiFetch('/api/bookings/'+b.id, {method:'PUT', body:JSON.stringify({...form, status:b.status})}).catch(e=>console.error(e)); }
    }
  } else {
    const payload = {staffId, playerId: player?player.id:null, status:opts.setStatus||'confirmed', ...form};
    if(ONLINE){
      try{
        const created = await apiFetch('/api/bookings', {method:'POST', body:JSON.stringify(payload)});
        state.bookings.push(created);
      }catch(e){
        console.error(e);
        state.bookings.push({id:uid('b'), staffId, playerId: player?player.id:null, role:s.role, status:opts.setStatus||'confirmed', ...form});
      }
    } else {
      state.bookings.push({id:uid('b'), staffId, playerId: player?player.id:null, role:s.role, status:opts.setStatus||'confirmed', ...form});
    }
  }
  state.hsCtx = null;
  renderOverlay();
  render();
}
function sendHandshakeBtn(staffId){
  const name = STAFF.find(x=>x.id===staffId).name.split(' ')[0];
  saveBooking(staffId, {setStatus:'pending'});
  showToast(`Handshake sent to ${name} — awaiting their response`);
}

/* ============ BACKEND SYNC (optional) ============ */
/* If a CourtConnect API server (see /server.js) is reachable, the app loads
   its data from there and every action syncs back to it — so bookings, chat,
   registrations etc. persist and are shared across everyone using that server.
   If no server is running, the app falls back to the original in-memory demo
   data and works exactly as a standalone file, same as before. */
const API_BASE = window.COURTCONNECT_API_BASE || 'http://localhost:8787';
let ONLINE = false;
let AUTH_TOKEN = null;
function authHeaders(extra){
  const h = Object.assign({'Content-Type':'application/json'}, extra||{});
  if(AUTH_TOKEN) h['Authorization'] = 'Bearer '+AUTH_TOKEN;
  return h;
}
async function apiFetch(path, opts){
  opts = opts || {};
  opts.headers = authHeaders(opts.headers);
  const res = await fetch(API_BASE+path, opts);
  if(!res.ok) throw new Error('API '+path+' → '+res.status);
  return res.status===204 ? null : res.json();
}
async function tryConnectBackend(){
  try{
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 700);
    const res = await fetch(API_BASE+'/api/health', {signal: ctrl.signal});
    clearTimeout(timer);
    if(!res.ok) return false;
    const boot = await apiFetch('/api/bootstrap');
    PLAYERS.length = 0; boot.players.forEach(p=>PLAYERS.push(p));
    STAFF.length = 0; boot.staff.forEach(s=>STAFF.push(s));
    if(boot.tournaments && boot.tournaments.length){ TOURNAMENTS.length = 0; boot.tournaments.forEach(t=>TOURNAMENTS.push(t)); }
    state.bookings = boot.bookings || [];
    state.crewBlocks = boot.blocks || [];
    if(PLAYERS[0]){
      state.currentPlayer = PLAYERS[0];
      if(boot.shortlists && boot.shortlists[PLAYERS[0].id]) state.shortlist = boot.shortlists[PLAYERS[0].id];
    }
    ONLINE = true;
    return true;
  }catch(e){
    ONLINE = false;
    return false;
  }
}

/* ============ boot ============ */
function afterRender(){
  renderOverlay();
  if(state.view==='planner'){
    const psEl = document.getElementById('plannerScroll');
    if(psEl){
      if(state.plannerScrollLeft==null){
        const pxday = ZOOM_PXDAY[state.zoom];
        state.plannerScrollLeft = Math.max(0, 150 + (0-PLANNER_MIN_DAY)*pxday - 40);
      }
      psEl.scrollLeft = state.plannerScrollLeft;
      psEl.addEventListener('scroll', updatePriceBadge);
      updatePriceBadge();
    }
  }
  if(state.view==='crewCalendar'){
    const csEl = document.getElementById('crewScroll');
    if(csEl){
      if(state.crewScrollLeft==null){
        const pxday = ZOOM_PXDAY[state.crewZoom];
        state.crewScrollLeft = Math.max(0, 150 + (0-PLANNER_MIN_DAY)*pxday - 40);
      }
      csEl.scrollLeft = state.crewScrollLeft;
    }
  }
  renderToast();
}
function showToast(msg){
  state.toast = msg;
  renderToast();
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ state.toast=null; renderToast(); }, 3200);
}
function renderToast(){
  let root = document.getElementById('toastRoot');
  if(!root){ root = document.createElement('div'); root.id='toastRoot'; document.body.appendChild(root); }
  root.innerHTML = state.toast ? `<div class="toast">${state.toast}</div>` : '';
}
(async function boot(){
  document.getElementById('app').innerHTML = '<div style="padding:80px 20px; text-align:center; color:var(--muted); font-size:13px;">Loading CourtConnect…</div>';
  await tryConnectBackend();
  render();
})();
</script>
